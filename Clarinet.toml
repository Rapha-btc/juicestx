[project]
name = "stx-juice"
description = "jSTX liquid stacking protocol - earn sBTC yield on your STX"
authors = []
telemetry = false
cache_dir = "./.cache"

[[project.requirements]]
contract_id = "SP000000000000000000002Q6VF78.pox-4"

[[project.requirements]]
contract_id = "SP3FBR2AGK5H9QBDH3EEN6DF8EK8JY7RX8QJ5SVTE.sip-010-trait-ft-standard"

[[project.requirements]]
contract_id = "SP2PABAF9FTAJYNFZH93XENAJ8FVY99RRM50D2JG9.nft-trait"

[[project.requirements]]
contract_id = "SM3VDXK3WZZSA84XXFKAFAF15NNZX32CTSG82JFQ4.sbtc-token"

[[project.requirements]]
contract_id = "SP3D6PV2ACBPEKYJTCMH7HEN02KP87QSP8KTEH335.commission-trait"


# -------------------------------------------------------
# Traits (no dependencies)
# -------------------------------------------------------

[contracts.vault-trait]
path = "contracts/traits/vault-trait.clar"

[contracts.fees-trait]
path = "contracts/traits/fees-trait.clar"

[contracts.commission-trait]
path = "contracts/traits/commission-trait.clar"

[contracts.position-trait]
path = "contracts/traits/position-trait.clar"

[contracts.pool-trait]
path = "contracts/traits/pool-trait.clar"

[contracts.stacker-trait]
path = "contracts/traits/stacker-trait.clar"

# -------------------------------------------------------
# Mocks (depend on traits only)
# -------------------------------------------------------
[contracts.pox-4-mock]
path = "contracts/mocks/pox-4-mock.clar"

[contracts.zest-mock]
path = "contracts/mocks/zest-mock.clar"

[contracts.fees-none]
path = "contracts/fees-none.clar"

# -------------------------------------------------------
# Foundation (no contract dependencies)
# -------------------------------------------------------
[contracts.dao]
path = "contracts/dao.clar"

# -------------------------------------------------------
# Registry (depends on dao)
# -------------------------------------------------------
[contracts.registry]
path = "contracts/registry.clar"

# -------------------------------------------------------
# Data layer (depends on dao)
# -------------------------------------------------------
[contracts.share-data]
path = "contracts/share-data.clar"

[contracts.redeem-stx-nft]
path = "contracts/redeem-stx-nft.clar"

# -------------------------------------------------------
# Token + Reward tracking (depends on dao, share-data)
# -------------------------------------------------------
[contracts.jstx-token]
path = "contracts/jstx-token.clar"

# -------------------------------------------------------
# Delegation (depends on dao, jstx-token)
# -------------------------------------------------------
[contracts.delegation]
path = "contracts/delegation.clar"
clarity_version = 4
epoch = "latest"

# -------------------------------------------------------
# Protocol (depends on everything above)
# -------------------------------------------------------
[contracts.vault]
path = "contracts/vault.clar"
clarity_version = 4
epoch = "latest"

[contracts.treasury]
path = "contracts/treasury.clar"

[contracts.commission]
path = "contracts/commission.clar"

[contracts.yield]
path = "contracts/yield.clar"

[contracts.core]
path = "contracts/core.clar"
clarity_version = 4
epoch = "latest"

[contracts.pool]
path = "contracts/pool.clar"
clarity_version = 4
epoch = "latest"

[contracts.stacker]
path = "contracts/stacker.clar"
clarity_version = 4
epoch = "latest"

# -------------------------------------------------------
# Strategy (depends on dao, delegation, registry, vault)
# -------------------------------------------------------
[contracts.allocation]
path = "contracts/allocation.clar"
clarity_version = 4
epoch = "latest"

# -------------------------------------------------------
# DeFi integration
# -------------------------------------------------------
[contracts.position-zest]
path = "contracts/position-zest.clar"

# -------------------------------------------------------
# Analysis settings
# -------------------------------------------------------
[repl.analysis]
passes = ["check_checker"]
check_checker = { trusted_sender = false, trusted_caller = false, callee_filter = false }
